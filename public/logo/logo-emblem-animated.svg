<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <!-- ===== GRADIENTS ===== -->

    <!-- Shield outer gold rim -->
    <linearGradient id="goldRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FEF3C7"/>
      <stop offset="25%"  stop-color="#FBBF24"/>
      <stop offset="55%"  stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="goldRimInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="50%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>

    <!-- Shield blue body -->
    <linearGradient id="shieldBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="40%"  stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0B1E5C"/>
    </linearGradient>
    <!-- Shield gloss (top-half highlight) -->
    <linearGradient id="shieldGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Chrome text: light → silver → dark silver → silver → highlight -->
    <linearGradient id="chromeText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F8FAFC"/>
      <stop offset="22%" stop-color="#E2E8F0"/>
      <stop offset="44%" stop-color="#94A3B8"/>
      <stop offset="55%" stop-color="#475569"/>
      <stop offset="70%" stop-color="#94A3B8"/>
      <stop offset="88%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <!-- Chrome gloss overlay (top 40%) -->
    <linearGradient id="chromeGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Ribbon gold -->
    <linearGradient id="ribbonGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FEF3C7"/>
      <stop offset="20%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="ribbonGoldFold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>

    <!-- Pitch green -->
    <linearGradient id="pitchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>

    <!-- Whistle chrome body -->
    <linearGradient id="whistleBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F1F5F9"/>
      <stop offset="35%" stop-color="#CBD5E1"/>
      <stop offset="55%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="whistleHole" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Soccer ball highlight -->
    <radialGradient id="ballGloss" cx="35%" cy="28%" r="55%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Star radial glow -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FEF3C7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FCD34D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Burst speed line -->
    <linearGradient id="speedLineL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#93C5FD" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="speedLineR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#2563EB" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </linearGradient>

    <!-- ===== FILTERS ===== -->

    <!-- Soft shadow -->
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="10"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text outer glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FBBF24" flood-opacity="0.55"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star glow filter -->
    <filter id="starGlowF" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip paths -->
    <clipPath id="chromeTopHalfClip">
      <rect x="0" y="480" width="1080" height="70"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1080" height="1080" fill="#FFFFFF"/>

  <!-- Subtle radial bg -->
  <radialGradient id="bgRadial" cx="50%" cy="50%" r="65%">
    <stop offset="0%"  stop-color="#EFF6FF"/>
    <stop offset="100%" stop-color="#FFFFFF"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#bgRadial)"/>

  <!-- Speed lines -->
  <g opacity="0.45">
    <rect x="60"  y="430" width="170" height="12" fill="url(#speedLineL)"/>
    <rect x="40"  y="470" width="220" height="10" fill="url(#speedLineL)"/>
    <rect x="80"  y="560" width="150" height="10" fill="url(#speedLineL)"/>
    <rect x="50"  y="610" width="200" height="12" fill="url(#speedLineL)"/>
    <rect x="820" y="430" width="170" height="12" fill="url(#speedLineR)"/>
    <rect x="820" y="470" width="220" height="10" fill="url(#speedLineR)"/>
    <rect x="850" y="560" width="150" height="10" fill="url(#speedLineR)"/>
    <rect x="830" y="610" width="200" height="12" fill="url(#speedLineR)"/>
  </g>

  <!-- Sparkle dots -->
  <g fill="#FBBF24" opacity="0.85">
    <circle cx="120" cy="240" r="6"/>
    <circle cx="960" cy="260" r="6"/>
    <circle cx="200" cy="880" r="5"/>
    <circle cx="880" cy="880" r="5"/>
    <circle cx="540" cy="92"  r="5"/>
    <circle cx="540" cy="990" r="5"/>
    <circle cx="100" cy="770" r="4"/>
    <circle cx="980" cy="770" r="4"/>
    
    <animate attributeName="opacity" values="0.85;0.3;0.85" dur="2.5s" repeatCount="indefinite"/>
  </g>

  <!-- Corner stars with glow -->
  <g>
    <g transform="translate(150 250) scale(1.3)" filter="url(#starGlowF)">
      <circle r="22" fill="url(#starGlow)"/>
      <polygon points="0,-18 5,-5 18,-5 8,3 12,16 0,8 -12,16 -8,3 -18,-5 -5,-5"
               fill="#FBBF24" stroke="#92400E" stroke-width="1.5"/>
    </g>
    <g transform="translate(930 250) scale(1.3)" filter="url(#starGlowF)">
      <circle r="22" fill="url(#starGlow)"/>
      <polygon points="0,-18 5,-5 18,-5 8,3 12,16 0,8 -12,16 -8,3 -18,-5 -5,-5"
               fill="#FBBF24" stroke="#92400E" stroke-width="1.5"/>
    </g>
    <g transform="translate(160 850) scale(1.1)" filter="url(#starGlowF)">
      <circle r="20" fill="url(#starGlow)"/>
      <polygon points="0,-18 5,-5 18,-5 8,3 12,16 0,8 -12,16 -8,3 -18,-5 -5,-5"
               fill="#FBBF24" stroke="#92400E" stroke-width="1.5"/>
    </g>
    <g transform="translate(920 850) scale(1.1)" filter="url(#starGlowF)">
      <circle r="20" fill="url(#starGlow)"/>
      <polygon points="0,-18 5,-5 18,-5 8,3 12,16 0,8 -12,16 -8,3 -18,-5 -5,-5"
               fill="#FBBF24" stroke="#92400E" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ===== SHIELD ===== -->
  <g filter="url(#softShadow)">
    <!-- Outer gold trim -->
    <path d="M 260 280
             L 820 280
             Q 845 280 845 310
             L 845 640
             Q 845 695 805 745
             Q 690 860 555 905
             L 525 905
             Q 390 860 275 745
             Q 235 695 235 640
             L 235 310
             Q 235 280 260 280
             Z"
          fill="url(#goldRim)" stroke="#78350F" stroke-width="3"/>
    <!-- Inner gold edge -->
    <path d="M 275 298
             L 805 298
             Q 825 298 825 318
             L 825 635
             Q 825 685 790 730
             Q 680 840 555 885
             L 525 885
             Q 400 840 290 730
             Q 255 685 255 635
             L 255 318
             Q 255 298 275 298
             Z"
          fill="url(#goldRimInner)" opacity="0.85"/>
    <!-- Blue body -->
    <path d="M 295 320
             L 785 320
             Q 800 320 800 335
             L 800 630
             Q 800 675 770 715
             Q 670 815 554 855
             L 526 855
             Q 410 815 310 715
             Q 280 675 280 630
             L 280 335
             Q 280 320 295 320
             Z"
          fill="url(#shieldBlue)"/>
    <!-- Top gloss highlight -->
    <path d="M 300 325
             L 780 325
             Q 795 325 795 340
             L 795 470
             Q 540 500 285 470
             L 285 340
             Q 285 325 300 325
             Z"
          fill="url(#shieldGloss)"/>
    <!-- Subtle vertical divider for emblem feel -->
    <line x1="540" y1="328" x2="540" y2="485" stroke="#FFFFFF" stroke-width="1.5" opacity="0.08"/>
  </g>

  <!-- ===== TOP ICONS: FLAG + BALL + WHISTLE ===== -->

  <!-- Checkered flag (left) -->
  <g transform="translate(308 338)">
    <!-- Pole -->
    <rect x="0" y="-8" width="7" height="138" fill="#1F2937" rx="3"/>
    <rect x="0" y="-8" width="7" height="138" fill="#374151" opacity="0.3" rx="3"/>
    <circle cx="3.5" cy="-10" r="4" fill="#FCD34D" stroke="#78350F" stroke-width="1.5"/>
    <!-- Flag body tilted -->
    <g transform="rotate(-5 7 10)">
      <rect x="7" y="0" width="104" height="68" fill="#FDE68A" stroke="#1F2937" stroke-width="3.5" rx="2"/>
      <g fill="#1F2937">
        <rect x="7"  y="0"  width="26" height="22"/>
        <rect x="59" y="0"  width="26" height="22"/>
        <rect x="33" y="22" width="26" height="22"/>
        <rect x="85" y="22" width="26" height="22"/>
        <rect x="7"  y="44" width="26" height="24"/>
        <rect x="59" y="44" width="26" height="24"/>
      </g>
      <!-- Subtle shine -->
      <rect x="8" y="2" width="102" height="8" fill="#FFFFFF" opacity="0.35" rx="1"/>
    </g>
  </g>

  <!-- Soccer ball (center top) -->
  <g transform="translate(480 328)">
    
    <animateTransform attributeName="transform" type="rotate"
                      from="0 60 60" to="360 60 60"
                      additive="sum" dur="18s" repeatCount="indefinite"/>
    <circle cx="60" cy="60" r="58" fill="#FFFFFF" stroke="#0F172A" stroke-width="4.5"/>
    <!-- Main central black pentagon -->
    <polygon points="60,30 86,49 76,80 44,80 34,49"
             fill="#0F172A"/>
    <!-- Surrounding 5 smaller black pentagons around the edges -->
    <g fill="#0F172A">
      <polygon points="60,12 72,24 60,30 48,24"/>
      <polygon points="108,54 100,70 86,62 94,48"/>
      <polygon points="92,100 76,104 76,88 92,84"/>
      <polygon points="28,100 44,88 44,104 28,104"/>
      <polygon points="12,54 26,48 34,62 20,70"/>
    </g>
    <!-- Seam lines connecting pentagons -->
    <g stroke="#0F172A" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 60 30 L 60 12"/>
      <path d="M 86 49 L 100 40"/>
      <path d="M 76 80 L 86 96"/>
      <path d="M 44 80 L 34 96"/>
      <path d="M 34 49 L 20 40"/>
    </g>
    <!-- Ball gloss highlight -->
    <circle cx="60" cy="60" r="58" fill="url(#ballGloss)"/>
  </g>

  <!-- Whistle (right) -->
  <g transform="translate(650 350)">
    <!-- Lanyard -->
    <path d="M -12 -12 Q 30 -30 70 -6"
          stroke="#DC2626" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M -12 -12 Q 30 -30 70 -6"
          stroke="#FCA5A5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Ring -->
    <circle cx="92" cy="-4" r="8" fill="none" stroke="#1F2937" stroke-width="3"/>
    <circle cx="92" cy="-4" r="8" fill="none" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Whistle body -->
    <rect x="4" y="8" width="92" height="44" rx="16" fill="url(#whistleBody)" stroke="#1F2937" stroke-width="3"/>
    <!-- Gloss on whistle top -->
    <rect x="10" y="12" width="78" height="10" rx="5" fill="#FFFFFF" opacity="0.4"/>
    <!-- Chamber hole on top -->
    <ellipse cx="66" cy="30" rx="14" ry="11" fill="url(#whistleHole)"/>
    <ellipse cx="66" cy="27" rx="11" ry="2" fill="#64748B" opacity="0.6"/>
    <!-- Slit on top -->
    <rect x="55" y="44" width="22" height="3" rx="1" fill="#1F2937" opacity="0.8"/>
    <!-- Mouthpiece -->
    <rect x="-4" y="22" width="12" height="16" rx="3" fill="url(#whistleBody)" stroke="#1F2937" stroke-width="2.5"/>
    <rect x="-3" y="24" width="10" height="4" rx="1" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- ===== CHROME "JERSEY" TEXT ===== -->
  <g>
    <!-- Shadow -->
    <text x="542" y="600" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="145" letter-spacing="-4"
          textLength="460" lengthAdjust="spacingAndGlyphs"
          fill="#000000" opacity="0.55">JERSEY</text>
    <!-- Outer dark outline -->
    <text x="540" y="597" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="145" letter-spacing="-4"
          textLength="460" lengthAdjust="spacingAndGlyphs"
          fill="none" stroke="#0F172A" stroke-width="18" stroke-linejoin="round">JERSEY</text>
    <!-- Mid silver outline -->
    <text x="540" y="597" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="145" letter-spacing="-4"
          textLength="460" lengthAdjust="spacingAndGlyphs"
          fill="none" stroke="#94A3B8" stroke-width="4" stroke-linejoin="round"
          filter="url(#textGlow)">JERSEY</text>
    <!-- Chrome fill -->
    <text x="540" y="597" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="145" letter-spacing="-4"
          textLength="460" lengthAdjust="spacingAndGlyphs"
          fill="url(#chromeText)">JERSEY</text>
    <!-- Top gloss (clipped to upper half) -->
    <g clip-path="url(#chromeTopHalfClip)">
      <text x="540" y="597" text-anchor="middle"
            font-family="Arial Black, Helvetica Neue, sans-serif"
            font-weight="900" font-size="145" letter-spacing="-4"
            textLength="460" lengthAdjust="spacingAndGlyphs"
            fill="url(#chromeGloss)">JERSEY</text>
    </g>
    
    <!-- Moving shine overlay -->
    <text x="540" y="597" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="145" letter-spacing="-4"
          textLength="460" lengthAdjust="spacingAndGlyphs"
          fill="#FFFFFF" opacity="0" pointer-events="none">
      <animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite"/>JERSEY</text>
  </g>

  <!-- ===== "DROP" RIBBON BANNER ===== -->
  <g>
    <!-- Back fold (right) -->
    <path d="M 780 690 L 820 690 L 810 738 L 770 720 Z" fill="url(#ribbonGoldFold)"/>
    <!-- Back fold (left) -->
    <path d="M 300 690 L 260 690 L 270 738 L 310 720 Z" fill="url(#ribbonGoldFold)"/>
    <!-- Main ribbon -->
    <path d="M 285 640
             L 795 640
             L 820 680
             L 795 720
             L 285 720
             L 260 680
             Z"
          fill="url(#ribbonGold)" stroke="#78350F" stroke-width="3"/>
    <!-- Ribbon gloss (top band) -->
    <path d="M 290 645 L 790 645 L 812 678 L 290 678 Z" fill="#FFFFFF" opacity="0.25"/>
    <!-- Side triangles (inner folds) -->
    <path d="M 285 640 L 260 680 L 285 720 L 305 680 Z" fill="url(#ribbonGoldFold)" opacity="0.7"/>
    <path d="M 795 640 L 820 680 L 795 720 L 775 680 Z" fill="url(#ribbonGoldFold)" opacity="0.7"/>
    <!-- DROP text -->
    <text x="540" y="703" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="66" letter-spacing="14"
          fill="#0F172A">DROP</text>
    <!-- Subtle text highlight -->
    <text x="540" y="703" text-anchor="middle"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900" font-size="66" letter-spacing="14"
          fill="#FFFFFF" opacity="0.18">DROP</text>
  </g>

  <!-- ===== GREEN PITCH FOOTER ===== -->
  <g>
    <path d="M 330 745
             L 750 745
             Q 740 790 660 835
             L 420 835
             Q 340 790 330 745
             Z"
          fill="url(#pitchGrad)" stroke="#166534" stroke-width="2"/>
    <!-- Pitch pattern stripes -->
    <g opacity="0.25">
      <path d="M 330 760 Q 540 772 750 760" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
      <path d="M 340 790 Q 540 802 740 790" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
      <path d="M 360 815 Q 540 828 720 815" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
    </g>
    <!-- Center circle -->
    <circle cx="540" cy="780" r="32" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="540" cy="780" r="3.5" fill="#FFFFFF"/>
    <!-- Center line -->
    <line x1="340" y1="780" x2="740" y2="780" stroke="#FFFFFF" stroke-width="2" opacity="0.75"/>
  </g>

  <!-- ===== SIDE STAR ACCENTS ===== -->
  <g>
    <g transform="translate(258 545)" filter="url(#starGlowF)">
      <polygon points="0,-22 7,-8 22,-6 10,4 14,20 0,10 -14,20 -10,4 -22,-6 -7,-8"
               fill="#FBBF24" stroke="#78350F" stroke-width="2"/>
    </g>
    <g transform="translate(822 545)" filter="url(#starGlowF)">
      <polygon points="0,-22 7,-8 22,-6 10,4 14,20 0,10 -14,20 -10,4 -22,-6 -7,-8"
               fill="#FBBF24" stroke="#78350F" stroke-width="2"/>
    </g>
  </g>
</svg>